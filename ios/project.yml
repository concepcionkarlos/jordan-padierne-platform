# XcodeGen spec — source of truth for the Xcode project.
# Regenerate the .xcodeproj with:  cd ios && xcodegen generate
name: JordanCRM
options:
  bundleIdPrefix: com.jordanpadierne
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  JordanCRM:
    type: application
    platform: iOS
    sources:
      - Sources
      - Shared
      - Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
      - target: VoiceWidgetExtension
        embed: true
    # NOTE: the APNs push entitlement (aps-environment) + remote-notification
    # background mode are re-added in Push Increment ③, once the App ID has Push
    # enabled and the .p8 key exists — keeping them out now lets the core app sign
    # and install without any push provisioning.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanpadierne.crm
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"          # iPhone only
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Jordan CRM"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock the app with Face ID."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record quick voice notes for your clients."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Transcribe your voice notes on-device."
        INFOPLIST_KEY_UIUserInterfaceStyle: Light          # the UI is designed for light; lock it
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan business cards to capture new leads."
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: "Add your showings to your calendar."
        # DEVELOPMENT_TEAM + signing are set on your Mac when you archive for TestFlight.

  # Live Activity / Dynamic Island for active voice-note capture.
  VoiceWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanpadierne.crm.VoiceWidget
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Widget/Info.plist
        SKIP_INSTALL: "YES"

schemes:
  JordanCRM:
    build:
      targets:
        JordanCRM: all
    run:
      config: Debug
